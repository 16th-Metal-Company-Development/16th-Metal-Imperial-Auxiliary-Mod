name: Build Check

on:
  pull_request:
    branches:
      - release

jobs:
  windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout the source code
        uses: actions/checkout@v4

      - name: Setup HEMTT
        uses: arma-actions/hemtt@v1

      - name: Build Mod
        run: hemtt build --no-rap
